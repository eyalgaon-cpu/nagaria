name: Apply Update to Sheets
on:
  push:
    branches: [main]
    paths: ['commands/pending.json']

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply command
        run: |
          CMD=$(cat commands/pending.json)
          HAS=$(echo "$CMD" | python3 -c "import sys,json; d=json.load(sys.stdin); print('yes' if 'action' in d else 'no')" 2>/dev/null || echo 'no')
          echo "Has action: $HAS"
          if [ "$HAS" = "yes" ]; then
            echo "Calling Apps Script..."
            RESULT=$(curl -s -L -X POST \
              "https://script.google.com/macros/s/AKfycbyZkdn7n9ZYNCR0UXpgRMt5oaS9dAJUvh66FWwHw0HYH5M4hS61penR1rnbQ4C-x6wN/exec" \
              -H "Content-Type: text/plain" \
              -d "$CMD")
            echo "Result: $RESULT"
            echo '{"status":"done"}' > commands/pending.json
            git config user.name "מאיה"
            git config user.email "maya@nagaria.app"
            git add commands/pending.json
            git commit -m "clear [skip ci]"
            git push
          fi
